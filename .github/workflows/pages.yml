name: Deploy Web to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/site/package-lock.json

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Resolve site base
        shell: bash
        run: |
          if [ "${{ github.event.repository.name }}" = "${{ github.repository_owner }}.github.io" ]; then
            echo "SITE_BASE=/" >> "$GITHUB_ENV"
          else
            echo "SITE_BASE=/${{ github.event.repository.name }}/" >> "$GITHUB_ENV"
          fi

      - name: Install site dependencies
        run: npm ci
        working-directory: apps/site

      - name: Build promo site
        run: npm run build
        working-directory: apps/site
        env:
          SITE_GITHUB_OWNER: ${{ vars.SITE_GITHUB_OWNER || github.repository_owner }}
          SITE_GITHUB_REPO: ${{ vars.SITE_GITHUB_REPO || github.event.repository.name }}
          SITE_GITHUB_TOKEN: ${{ secrets.SITE_GITHUB_TOKEN }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "./apps/site/dist"

  deploy:
    environment: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
