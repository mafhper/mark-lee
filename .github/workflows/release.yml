name: Release Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      dmg_only:
        description: "Run only optional macOS DMG job"
        required: false
        type: boolean
        default: false

jobs:
  release:
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.dmg_only != true }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            tauriArgs: --bundles app
          - platform: ubuntu-latest
            tauriArgs: ""
          - platform: windows-latest
            tauriArgs: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build and Release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.tauriArgs }}
          tagName: ${{ github.ref_name }}
          releaseName: 'Mark-Lee v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false

  release-macos-dmg:
    name: Optional macOS DMG (non-blocking)
    needs: release
    if: ${{ always() && (github.event_name == 'workflow_dispatch' || needs.release.result == 'success') }}
    runs-on: macos-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Build and attach DMG (optional)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --bundles dmg
          tagName: ${{ github.ref_name }}
          releaseName: 'Mark-Lee v__VERSION__'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: false
          prerelease: false

      - name: Collect DMG bundle logs on failure
        if: failure()
        shell: bash
        run: |
          mkdir -p /tmp/mark-lee-dmg-logs
          if [ -d "src-tauri/target/release/bundle/dmg" ]; then
            cp -R src-tauri/target/release/bundle/dmg /tmp/mark-lee-dmg-logs/
          fi
          if [ -f "src-tauri/target/release/bundle/dmg/bundle_dmg.sh" ]; then
            cp src-tauri/target/release/bundle/dmg/bundle_dmg.sh /tmp/mark-lee-dmg-logs/
          fi

      - name: Upload DMG failure logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dmg-bundle-logs-${{ github.run_id }}
          path: /tmp/mark-lee-dmg-logs
          if-no-files-found: ignore
