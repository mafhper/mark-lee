name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Desktop Web Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

  site:
    name: Site Build, Check & Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install site dependencies
        run: npm ci
        working-directory: apps/site

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Check site types
        run: npm run site:check
        env:
          SITE_BASE: /
          SITE_GITHUB_OWNER: ${{ github.repository_owner }}
          SITE_GITHUB_REPO: ${{ github.event.repository.name }}
          SITE_GITHUB_TOKEN: ${{ secrets.SITE_GITHUB_TOKEN }}

      - name: Build site
        run: npm run site:build
        env:
          SITE_BASE: /
          SITE_GITHUB_OWNER: ${{ github.repository_owner }}
          SITE_GITHUB_REPO: ${{ github.event.repository.name }}
          SITE_GITHUB_TOKEN: ${{ secrets.SITE_GITHUB_TOKEN }}

      - name: Smoke test site
        run: node scripts/smoke-site.mjs

  rust:
    name: Rust Check
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Cargo
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri
