name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  web:
    name: Desktop Web Build & Typecheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build

  site:
    name: Site Build, Check & Smoke
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            apps/site/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install site dependencies
        run: npm ci
        working-directory: apps/site

      - name: Install Playwright browser
        run: npm run smoke:install-browser

      - name: Check site types
        run: npm run site:check
        env:
          SITE_BASE: /
          SITE_GITHUB_OWNER: ${{ github.repository_owner }}
          SITE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Build site
        run: npm run site:build
        env:
          SITE_BASE: /
          SITE_GITHUB_OWNER: ${{ github.repository_owner }}
          SITE_GITHUB_REPO: ${{ github.event.repository.name }}

      - name: Smoke test site
        timeout-minutes: 8
        run: node scripts/smoke-site.mjs

  rust:
    name: Rust Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libglib2.0-dev libgtk-3-dev libwebkit2gtk-4.1-dev libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Cache Cargo
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Cargo check
        run: cargo check
        working-directory: src-tauri
