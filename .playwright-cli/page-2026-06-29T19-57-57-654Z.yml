            - generic [ref=e157]: Ideas can travel through time and space
            - paragraph [ref=e158]: "Ideas can travel through time and space without being uttered out loud. The process of telepathy requires two places:"
            - list [ref=e159]:
              - listitem [ref=e160]:
                - text: A
                - strong [ref=e161]: sending place
                - text: ", a transmission place — where the writer sends ideas, such as a desk"
