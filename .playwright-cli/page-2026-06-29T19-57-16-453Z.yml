  - generic [ref=e293]:
    - generic [ref=e294]:
      - heading "Your thoughts stay in your head. Your entries stay on your device." [level=2] [ref=e295]:
        - text: Your thoughts stay in your head.
        - text: Your entries stay on your device.
      - paragraph [ref=e296]: I built Cozy because I wanted a private place to write, not another app quietly collecting what I put into it. Everything you write stays on your own device. That's the whole point.
    - generic [ref=e297]:
