          - img [ref=e301]
          - heading "Nothing synced to a server" [level=3] [ref=e304]
          - paragraph [ref=e305]: There's no mystery cloud. Your journal lives right where you write it, on your own computer. No breach to worry about, no subscription to pay, no stranger who can open your diary.
        - article [ref=e306]:
          - img [ref=e308]
          - heading "Nothing fed to an AI" [level=3] [ref=e311]
          - paragraph [ref=e312]: I don't think your private writing should be used to train anything. Nothing you write in Cozy is scraped, read, or sent off to an algorithm. No AI, simple as that.
        - article [ref=e313]:
          - img [ref=e315]
          - heading "Your words are yours" [level=3] [ref=e318]
          - paragraph [ref=e319]: "What you write belongs to you. Maybe you're working through a rough day, maybe you're just keeping track of life as it happens. Either way, you stay in charge: keep your entries to yourself, or export and share them whenever you like."
  - generic [ref=e321]:
    - generic [ref=e322]:
      - heading "What early users are saying" [level=2] [ref=e323]
      - paragraph [ref=e324]: Still, Cozy is still in its baby stage, but here are some of the things my wonderful early users have said about it ✨
    - generic [ref=e325]:
      - 'link "akalanaya on Reddit: After using Day One for 15 years, I''ve made the jump to another journaling app. I never thought this day would come to be honest, I was locked in to Day One and even put my old handwritten entries in there. The never ending push to upgrade, AI inclusion and lack of quality updates is just too much. I''ve moved to Cozy and I''m really enjoying it. Cozy is lightweight, actively being worked on and already offers some features I''ve been wanting in Day One, such as image resizing. I had some issues with the import feature and the developer was very responsive, even releasing a fix that same day. I hope everyone who is frustrated with Day One finds an alternative that suits them." [ref=e326] [cursor=pointer]':
        - /url: https://www.reddit.com/r/dayoneapp/comments/1u4qty8/comment/orx5k4k/
        - 'img "akalanaya on Reddit: After using Day One for 15 years, I''ve made the jump to another journaling app. I never thought this day would come to be honest, I was locked in to Day One and even put my old handwritten entries in there. The never ending push to upgrade, AI inclusion and lack of quality updates is just too much. I''ve moved to Cozy and I''m really enjoying it. Cozy is lightweight, actively being worked on and already offers some features I''ve been wanting in Day One, such as image resizing. I had some issues with the import feature and the developer was very responsive, even releasing a fix that same day. I hope everyone who is frustrated with Day One finds an alternative that suits them." [ref=e327]'
      - img "I was a Day One user, but woke up one morning to them encouraging me to use AI to “interrogate” my journal. Nope. That sent me looking for an alternative. I really like Cozy so far! It's clean, it's easy to use, my Day One entries zipped right into it. Thank you!" [ref=e329]
      - img "I'm loving Cozy so far and can't wait to try out the iPhone app as well when it's ready. Everything is working really well and it is a great writing experience in the app, very enjoyable to use." [ref=e331]
      - img "Hey Alberto, I just wanted to say you're really awesome for making an app like this. It has so much potential, and even in its current state it is a joy to journal with. — PJ" [ref=e333]
